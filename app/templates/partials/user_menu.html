{#
  Reusable top-right avatar + dropdown + sidebar bottom card.
  Requires: display_name, display_email, profile_url, logout_url, avatar_initial
#}

<!-- ── TOP-RIGHT AVATAR DROPDOWN ── -->
<div class="topbar-user-menu" id="userMenuWrap">
  <button class="topbar-avatar" onclick="toggleUserMenu(event)" aria-label="User menu" title="{{ display_name }}">
    {{ avatar_initial }}
  </button>
  <div class="user-dropdown" id="userDropdown">
    <div class="user-dropdown-header">
      <div style="font-weight:700;font-size:14px;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ display_name }}</div>
      <div style="font-size:12px;color:var(--gray-500);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ display_email }}</div>
    </div>
    <a href="{{ profile_url }}" class="user-dropdown-item">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      View Profile
    </a>
    <div class="user-dropdown-divider"></div>
    <a href="{{ logout_url }}" class="user-dropdown-item" style="color:var(--danger)">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      Logout
    </a>
  </div>
</div>
