<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | CareBot</title>
<link rel="stylesheet" href="/static/css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <a class="logo" href="/">
        <svg width="30" height="30" viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="#2563EB"/><path d="M16 8v16M8 16h16" stroke="white" stroke-width="3" stroke-linecap="round"/></svg>
        CareBot
      </a>
    </div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to your health dashboard</p>

    {% if registered %}
    <div class="alert alert-success">✓ Account created successfully! Please sign in.</div>
    {% endif %}

    {% if error %}
    <div class="alert alert-danger">⚠ {{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="john@email.com" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Your password" required>
      </div>
      <div style="text-align:right;margin-bottom:16px">
        <a href="/forgot-password" style="font-size:13px;color:var(--primary)">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Sign In</button>
    </form>
    <div class="auth-footer">Don't have an account? <a href="/register">Create one</a></div>
  </div>
</div>
</body>
</html>
